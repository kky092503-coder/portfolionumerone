<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — 가영</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg0:#07070a;
      --bg1:#0b0b12;
      --bg2:#10101a;
      --panel: rgba(18,18,26,.72);
      --panel2: rgba(20,20,30,.84);
      --border: rgba(255,255,255,.10);
      --border2: rgba(255,255,255,.18);

      --pink:#ff4fd8;
      --pink2:#ff9be6;
      --rose:#ff2f7b;
      --white:#f6f3ff;
      --muted: rgba(246,243,255,.68);

      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 16px;

      --focus: 0 0 0 3px rgba(255,79,216,.22);
    }

    html, body { height: 100%; }
    body{
      background: radial-gradient(1200px 700px at 12% 12%, rgba(255,79,216,.16), transparent 60%),
                  radial-gradient(900px 600px at 86% 22%, rgba(255,47,123,.12), transparent 55%),
                  radial-gradient(900px 700px at 55% 90%, rgba(255,155,230,.10), transparent 55%),
                  linear-gradient(180deg, var(--bg0), var(--bg1) 40%, var(--bg0));
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--white);
      font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.7;
      font-size: 15px;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* subtle grain */
    body::before{
      content:"";
      position: fixed; inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.05), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,.04), transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,.03), transparent 40%);
      mix-blend-mode: overlay;
      opacity: .45;
      filter: blur(0.2px);
    }

    .wrap{ max-width: 980px; margin: 0 auto; padding: 42px 28px 120px; position: relative; }

    /* top nav */
    .topbar{
      display:flex; align-items:center; justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(18,18,26,.68), rgba(18,18,26,.40));
      backdrop-filter: blur(10px);
      border-radius: 999px;
      box-shadow: 0 10px 40px rgba(0,0,0,.25);
      position: sticky; top: 18px; z-index: 40;
    }
    .brand{
      display:flex; align-items: center; gap: 10px;
      font-size: 12px;
      letter-spacing: 2.6px;
      text-transform: uppercase;
      color: rgba(246,243,255,.78);
      padding-left: 8px;
      white-space: nowrap;
    }
    .brand-dot{
      width: 9px; height: 9px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--pink2), var(--pink));
      box-shadow: 0 0 18px rgba(255,79,216,.35);
    }
    .top-actions{ display:flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .pill{
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: rgba(246,243,255,.82);
      cursor: pointer;
      transition: transform .15s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
      font-family: inherit;
      line-height: 1;
    }
    .pill:hover{ transform: translateY(-1px); border-color: rgba(255,79,216,.38); background: rgba(255,79,216,.06); }
    .pill:focus-visible{ outline: none; box-shadow: var(--focus); }
    .pill.primary{
      border-color: rgba(255,79,216,.38);
      background: linear-gradient(90deg, rgba(255,79,216,.22), rgba(255,47,123,.16));
    }

    /* hero */
    .hero{
      padding: 58px 0 42px;
      border-bottom: 1px solid var(--border);
      margin-top: 18px;
    }
    .hero-grid{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 26px;
      align-items: start;
    }
    .hero-kicker{
      font-size: 11px;
      letter-spacing: 3.4px;
      text-transform: uppercase;
      color: rgba(255,79,216,.85);
      margin-bottom: 18px;
    }
    .hero-name{
      font-family: "Playfair Display", serif;
      font-size: clamp(40px, 7vw, 66px);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 14px;
      font-style: normal;
      color: var(--white);
    }
    .hero-sub{
      font-size: 14px;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.95;
    }
    .hero-tags{
      margin-top: 12px;
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hero-tag{
      font-size: 11px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(246,243,255,.80);
    }
    .hero-links{
      display:flex; flex-wrap: wrap; gap: 10px;
      margin-top: 18px;
    }
    .link-chip{
      display:inline-flex; align-items:center; gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: rgba(246,243,255,.86);
      background: rgba(255,255,255,.02);
      cursor: pointer;
      transition: border-color .2s ease, background .2s ease, transform .15s ease;
    }
    .link-chip:hover{ transform: translateY(-1px); border-color: rgba(255,79,216,.35); background: rgba(255,79,216,.06); }
    .link-chip small{ color: rgba(246,243,255,.62); font-size: 11px; }

    .hero-photo{
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 2px solid rgba(255,155,230,.55);
      background: radial-gradient(circle at 30% 20%, rgba(255,79,216,.35), rgba(0,0,0,.85));
      overflow: visible; /* 동그라미는 유지하고, 버튼은 바깥에 보이게 */
      box-shadow: 0 18px 50px rgba(0,0,0,.65);
      position: relative;
      margin-left: auto;
    }
    .photo-inner{
      display:flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 0;
    }
    .photo-img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display:none;
    }
    .photo-empty{
      text-align:center;
      color: rgba(246,243,255,.80);
      font-size: 13px;
      padding: 16px 14px;
    }
    .photo-empty strong{ display:block; font-weight: 600; margin-bottom: 6px; color: rgba(255,155,230,.95); }
    .photo-actions{
      position:absolute;
      left: 50%;
      bottom: -70px;
      transform: translateX(-50%);
      display:flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .photo-actions .pill{
      white-space: nowrap;
      padding-inline: 18px;
      min-width: 88px;
      text-align: center;
    }
    .file-input{ display:none; }

    /* sections */
    .section{ margin-top: 56px; }
    .section-header{
      display:flex; align-items: baseline; gap: 16px;
      margin-bottom: 22px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .section-num{
      font-size: 11px;
      letter-spacing: 2.2px;
      color: rgba(255,79,216,.85);
      font-weight: 600;
    }
    .section-title{
      font-family: "Playfair Display", serif;
      font-size: 24px;
      font-weight: 400;
    }
    .section-meta{
      margin-left:auto;
      display:flex; align-items:center; gap: 10px;
      color: rgba(246,243,255,.66);
      font-size: 12px;
    }
    .section-meta span{ padding: 0 6px; }

    .add-btn{
      margin-left: auto;
      font-size: 12px;
      color: rgba(255,155,230,.95);
      background: rgba(255,79,216,.06);
      border: 1px solid rgba(255,79,216,.28);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
      font-family: inherit;
      line-height: 1;
      white-space: nowrap;
    }
    .add-btn:hover{ transform: translateY(-1px); border-color: rgba(255,79,216,.45); background: rgba(255,79,216,.10); }
    .add-btn:focus-visible{ outline: none; box-shadow: var(--focus); }

    /* cards */
    .card{
      background: linear-gradient(180deg, rgba(18,18,26,.70), rgba(18,18,26,.46));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 22px;
      margin-bottom: 14px;
      position: relative;
      box-shadow: 0 14px 42px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
      transition: border-color .2s ease, transform .15s ease, background .2s ease;
    }
    .card:hover{ border-color: rgba(255,79,216,.22); transform: translateY(-1px); background: linear-gradient(180deg, rgba(18,18,26,.76), rgba(18,18,26,.52)); }
    .card.clickable{ cursor:pointer; }
    .card:focus-within{ box-shadow: var(--focus), 0 14px 42px rgba(0,0,0,.28); }

    .card-actions{
      position:absolute; top: 14px; right: 14px;
      display:flex; gap: 8px;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 3;
    }
    .card:hover .card-actions{ opacity: 1; }
    .act-btn{
      font-size: 12px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(246,243,255,.72);
      padding: 7px 12px;
      border-radius: 999px;
      cursor:pointer;
      transition: border-color .2s ease, background .2s ease, transform .15s ease, color .2s ease;
      font-family: inherit;
      line-height: 1;
    }
    .act-btn:hover{ transform: translateY(-1px); border-color: rgba(255,79,216,.35); background: rgba(255,79,216,.08); color: rgba(246,243,255,.90); }
    .del-btn:hover{ border-color: rgba(255,60,100,.45) !important; background: rgba(255,60,100,.10) !important; color: rgba(255,150,170,.95) !important; }

    /* certificate */
    .cert-name{ font-size: 17px; font-weight: 600; margin-bottom: 4px; letter-spacing: .2px; }
    .cert-org{ font-size: 13px; color: rgba(255,155,230,.92); margin-bottom: 4px; }
    .cert-date{ font-size: 12px; color: rgba(246,243,255,.62); margin-bottom: 12px; }
    .cert-summary{
      font-size: 13px;
      color: rgba(246,243,255,.70);
      line-height: 1.85;
      padding-left: 14px;
      border-left: 2px solid rgba(255,79,216,.35);
    }

    /* activity */
    .act-title{ font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .act-period{ font-size: 12px; color: rgba(255,155,230,.92); margin-bottom: 12px; }
    .act-tags{ display:flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag{
      font-size: 11px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.12);
      padding: 4px 10px;
      border-radius: 999px;
      color: rgba(246,243,255,.70);
    }
    .act-section-label{
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(246,243,255,.86);
      font-weight: 600;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .act-section-label.learn{ color: rgba(255,79,216,.95); }
    .act-body{ font-size: 13px; color: rgba(246,243,255,.70); line-height: 1.85; }

    /* awards */
    .award-row{ display:flex; align-items:flex-start; gap: 18px; }
    .award-badge{
      flex-shrink:0;
      width: 64px; height: 64px;
      border-radius: 18px;
      display:flex; align-items:center; justify-content: center;
      font-size: 11px;
      letter-spacing: .2px;
      color: rgba(255,155,230,.95);
      border: 1px solid rgba(255,79,216,.26);
      background: radial-gradient(circle at 30% 30%, rgba(255,79,216,.18), rgba(0,0,0,.10));
      box-shadow: 0 12px 26px rgba(0,0,0,.25);
      text-align: center;
      padding: 8px;
      line-height: 1.2;
    }
    .award-contest{ font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .award-role{ font-size: 12px; color: rgba(246,243,255,.70); margin-bottom: 10px; }
    .award-feel{ font-size: 13px; color: rgba(246,243,255,.66); line-height: 1.85; font-style: italic; }

    /* intern */
    .intern-card{
      display:grid;
      grid-template-columns: 1fr 1.15fr;
      border-radius: var(--radius);
      overflow:hidden;
      border: 1px solid var(--border);
      margin-bottom: 14px;
      position: relative;
      background: rgba(18,18,26,.46);
      box-shadow: 0 14px 42px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
      transition: border-color .2s ease, transform .15s ease;
    }
    .intern-card:hover{ border-color: rgba(255,79,216,.22); transform: translateY(-1px); }
    .intern-left{ padding: 22px; background: linear-gradient(180deg, rgba(255,79,216,.10), rgba(255,255,255,.02)); }
    .intern-right{ padding: 22px; background: linear-gradient(180deg, rgba(18,18,26,.72), rgba(18,18,26,.40)); border-left: 1px solid rgba(255,255,255,.08); }
    .intern-company{
      font-family: "Playfair Display", serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .intern-country{
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,155,230,.95);
      margin-bottom: 6px;
    }
    .intern-period{ font-size: 12px; color: rgba(246,243,255,.68); margin-bottom: 6px; }
    .intern-dept{ font-size: 12px; color: rgba(246,243,255,.68); }
    .intern-gains{ list-style:none; display:flex; flex-direction: column; gap: 14px; }
    .intern-gain{ display:flex; gap: 12px; }
    .gain-dot{
      width: 7px; height: 7px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--pink2), var(--pink));
      box-shadow: 0 0 18px rgba(255,79,216,.35);
      margin-top: 8px;
      flex-shrink:0;
    }
    .gain-title{ font-size: 12px; font-weight: 700; color: rgba(255,155,230,.95); margin-bottom: 3px; }
    .gain-desc{ font-size: 12px; color: rgba(246,243,255,.68); line-height: 1.75; }
    .intern-actions{
      position:absolute; top: 14px; right: 14px;
      display:flex; gap: 8px;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 2;
    }
    .intern-card:hover .intern-actions{ opacity: 1; }

    /* skills */
    .skill-card{
      background: linear-gradient(180deg, rgba(18,18,26,.70), rgba(18,18,26,.46));
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 18px 18px 12px;
      box-shadow: 0 14px 42px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
    }
    .skill-label{
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(246,243,255,.70);
      margin-bottom: 10px;
    }
    .skill-tags{
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .skill-tag{
      font-size: 11px;
      padding: 5px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(246,243,255,.78);
    }

    /* about */
    .about-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 14px;
    }
    .about-card{
      position: relative;
      border-radius: 18px;
      padding: 16px 16px 14px;
      background: linear-gradient(140deg, rgba(255,79,216,.10), rgba(18,18,26,.80));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
      font-size: 13px;
      color: rgba(246,243,255,.80);
      line-height: 1.75;
    }
    .about-card-num{
      position:absolute;
      top: 10px; right: 12px;
      font-size: 11px;
      color: rgba(255,155,230,.95);
    }
    .about-card-title{
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: rgba(246,243,255,.94);
    }

    /* empty */
    .empty-state{
      text-align:center;
      padding: 34px 18px;
      color: rgba(246,243,255,.62);
      font-size: 13px;
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,.02);
    }

    /* modal */
    .modal-overlay{
      position: fixed; inset: 0;
      background: rgba(0,0,0,.72);
      display:flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 22px;
    }
    .modal{
      width: 100%;
      max-width: 680px;
      max-height: 86vh;
      overflow:auto;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(18,18,26,.82), rgba(18,18,26,.56));
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      padding: 26px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.18) transparent;
    }
    .modal-top{
      display:flex; align-items:flex-start; justify-content: space-between; gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      margin-bottom: 18px;
    }
    .modal h3{
      font-family: "Playfair Display", serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.2;
      margin: 0;
    }
    .modal-close{
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.10);
      color: rgba(246,243,255,.74);
      border-radius: 999px;
      padding: 7px 12px;
      cursor:pointer;
      font-family: inherit;
      line-height: 1;
    }
    .modal-close:hover{ border-color: rgba(255,79,216,.35); background: rgba(255,79,216,.06); color: rgba(246,243,255,.92); }

    .field{ margin-bottom: 14px; }
    .field label{
      display:block;
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: rgba(246,243,255,.62);
      margin-bottom: 8px;
    }
    .field input, .field textarea{
      width: 100%;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      color: rgba(246,243,255,.92);
      font-family: inherit;
      font-size: 14px;
      padding: 11px 12px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .field textarea{ resize: vertical; min-height: 96px; line-height: 1.75; }
    .field input:focus, .field textarea:focus{
      border-color: rgba(255,79,216,.40);
      box-shadow: var(--focus);
    }

    .modal-divider{ border: none; border-top: 1px solid rgba(255,255,255,.10); margin: 16px 0; }
    .modal-sublabel{
      font-size: 10px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(255,155,230,.95);
      margin: 12px 0 12px;
    }

    .modal-btns{
      display:flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .btn{
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      cursor:pointer;
      font-family: inherit;
      line-height: 1;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.10);
      color: rgba(246,243,255,.76);
      transition: border-color .2s ease, background .2s ease, transform .15s ease, color .2s ease;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(255,79,216,.35); background: rgba(255,79,216,.06); color: rgba(246,243,255,.92); }
    .btn:focus-visible{ outline: none; box-shadow: var(--focus); }
    .btn.primary{
      border-color: rgba(255,79,216,.40);
      background: linear-gradient(90deg, rgba(255,79,216,.26), rgba(255,47,123,.18));
      color: rgba(246,243,255,.92);
    }
    .btn.danger:hover{
      border-color: rgba(255,60,100,.50) !important;
      background: rgba(255,60,100,.10) !important;
      color: rgba(255,180,190,.98) !important;
    }

    /* detail view (blog-like) */
    .detail-grid{ display:grid; grid-template-columns: 1fr; gap: 12px; }
    .detail-meta{
      display:flex; gap: 10px; flex-wrap: wrap;
      color: rgba(246,243,255,.66);
      font-size: 12px;
    }
    .detail-meta .chip{
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.02);
    }
    .detail-body{
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.85;
      color: rgba(246,243,255,.78);
      background: rgba(0,0,0,.10);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 14px 14px;
    }
    .detail-photos{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
    }
    .detail-photos img{
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
    }

    /* custom cursor */
    body, button, a, input, textarea{
      cursor: none;
    }
    .cursor-dot, .cursor-ring{
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);

    function hydrate(){
      try{
        var raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        var parsed = JSON.parse(raw);
        if(parsed && typeof parsed === "object"){
          // 예전에 저장된 값 때문에 프로필 사진이 비어 있으면,
          // 코드에 적어둔 기본 경로(assets/profile.jpg)를 유지하도록 비워둔 값은 무시.
          if(parsed.hero && !parsed.hero.photoDataUrl){
            delete parsed.hero.photoDataUrl;
          }
          state = mergeSafe(state, parsed);
        }
      }catch(e){ /* ignore */ }
    }

    function persist(){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ /* ignore */ }

    function mergeSafe(base, incoming){
      var out = JSON.parse(JSON.stringify(base));
      Object.keys(incoming || {}).forEach(function(k){
        if(incoming[k] && typeof incoming[k] === "object" && !Array.isArray(incoming[k]) && out[k]){
          out[k] = mergeSafe(out[k], incoming[k]);
        } else {
          out[k] = incoming[k];
        }
      });
      return out;
    }

    function renderHeroLinks(){
      var el = document.getElementById("hero-links");
      if(!el) return;
      var links = (state.hero.links || []).filter(function(l){ return (l.label || "").trim(); });
      if(!links.length){ el.innerHTML = ""; return; }
      el.innerHTML = links.map(function(l, idx){
        var label = esc(l.label || "");
        var clickable = isLikelyUrl(l.value) || isLikelyEmail(l.value);
        var hint = clickable ? "열기" : "복사";
        return '<button class="link-chip" onclick="heroLinkAction(' + idx + ')">'
          + '<span>' + label + '</span>'
          + '<small>' + esc(hint) + '</small>'
          + "</button>";
      }).join("");
    }

    function heroLinkAction(index){
      var links = state.hero.links || [];
      var item = links[index];
      if(!item) return;
      var v = (item.value || "").trim();
      if(isLikelyEmail(v)){
        window.location.href = "mailto:" + v;
        return;
      }
      if(isLikelyUrl(v)){
        window.open(v, "_blank", "noopener,noreferrer");
        return;
      }
      if(v){
        try{ navigator.clipboard.writeText(v); alert("복사했어요: " + v); }catch(e){ /* ignore */ }
      }
    }

        html = modalTop("About Me 설정")
          + field("#1 제목", "a1t", "input", "", c1.title || "")
          + field("#1 내용", "a1b", "textarea", "왜 이 전공/분야를 선택했는지", c1.body || "")
          + field("#2 제목", "a2t", "input", "", c2.title || "")
          + field("#2 내용", "a2b", "textarea", "어떤 커리어 방향을 그리고 있는지", c2.body || "")
          + field("#3 제목", "a3t", "input", "", c3.title || "")
          + field("#3 내용", "a3b", "textarea", "일할 때 가장 중요하게 여기는 가치 2~3가지", c3.body || "물류가 멈추면 세상이 멈춘다는 말처럼 끊임없이 나아가는, 멈추지 않는 사람이 되고자 합니다.");

      } else if(type === "sections"){
        var st = state.sectionTitles || {};
        html = modalTop("섹션 이름 수정")
          + field("01 섹션 제목", "s1", "input", "예: Certificates · 자격증", st.cert || "Certificates · 자격증")
          + field("02 섹션 제목", "s2", "input", "예: Activities · 대외활동", st.act || "Activities · 대외활동")
          + field("03 섹션 제목", "s3", "input", "예: Awards · 공모전 수상", st.award || "Awards · 공모전 수상")
          + field("04 섹션 제목", "s4", "input", "예: Internship · 해외인턴", st.intern || "Internship · 해외인턴")
          + field("05 섹션 제목", "s5", "input", "예: Skills · 사용 가능 스킬", st.skill || "Skills · 사용 가능 스킬")
          + field("06 섹션 제목", "s6", "input", "예: Files · 첨부자료", st.file || "Files · 첨부자료");
      }

      html += modalBtns();
      showModal(html);
    }

    function openDetail(type, idx){
      editing = { type: type, idx: idx, mode: "detail" };
      var arr = getArr(type);
      var item = arr[idx];
      if(!item) return;
      var title = detailTitle(type, item);
      var meta = detailMeta(type, item);
      var body = (item.body || item.feel || item.learn || item.work || item.summary || "");
      var photos = (item.photos || []).filter(function(p){ return (p || "").trim(); }).slice(0, 6);

      if(type === "file"){
        var hasUpload = !!(item.dataUrl && item.filename);
        var link = (item.link || "").trim();
        var fileBlock = "";
        if(hasUpload){
          fileBlock += '<div class="detail-body">'
            + '업로드 파일: <strong>' + esc(item.filename) + "</strong><br>"
            + '<a class="link-chip" href="' + esc(item.dataUrl) + '" download="' + esc(item.filename) + '" style="margin-top:10px; display:inline-flex;">다운로드</a>'
            + "</div>";
        }
        if(link){
          fileBlock += '<div class="detail-body">'
            + '링크: <a href="' + esc(link) + '" target="_blank" rel="noopener noreferrer">' + esc(link) + "</a>"
            + "</div>";
        }
        var note = (item.note || "").trim();
        var htmlFile = modalTop(title)
          + '<div class="detail-grid">'
          + (meta ? ('<div class="detail-meta">' + meta + "</div>") : "")
          + (note ? ('<div class="detail-body">' + esc(note) + "</div>") : "")
          + (fileBlock || '<div class="detail-body">업로드 파일이나 링크가 아직 없어요. Edit로 추가해 보세요.</div>')
          + "</div>"
          + '<div class="modal-btns">'
          + '<button class="btn" data-detail-edit-type="' + type + '" data-detail-index="' + idx + '">Edit</button>'
          + '<button class="btn danger" data-detail-delete-type="' + type + '" data-detail-index="' + idx + '">Delete</button>'
          + '<button class="btn primary" onclick="closeModal()">Close</button>'
          + "</div>";
        showModal(htmlFile);
        return;
      }

      var html = modalTop(title)
        + '<div class="detail-grid">'
        + (meta ? ('<div class="detail-meta">' + meta + "</div>") : "")
        + (photos.length ? ('<div class="detail-photos">' + photos.map(function(p){ return '<img alt="관련 사진" src="' + esc(p) + '" loading="lazy">'; }).join("") + "</div>") : "")
        + '<div class="detail-body">' + esc(body || "상세 기록이 아직 없어요. Edit로 내용을 추가해 보세요.") + "</div>"
        + "</div>"
        + '<div class="modal-btns">'
        + '<button class="btn" data-detail-edit-type="' + type + '" data-detail-index="' + idx + '">Edit</button>'
        + '<button class="btn danger" data-detail-delete-type="' + type + '" data-detail-index="' + idx + '">Delete</button>'
        + '<button class="btn primary" onclick="closeModal()">Close</button>'
        + "</div>";

      showModal(html);
    }

    function detailTitle(type, item){
      if(type === "cert") return item.name || "자격증";
      if(type === "act") return item.title || "대외활동";
      if(type === "award") return item.contest || "수상";
      if(type === "intern") return item.company || "인턴";
      if(type === "file") return item.title || "파일";
      return "Detail";
    }

    function detailMeta(type, item){
      var chips = [];
      if(type === "cert"){
        if(item.org) chips.push(chip(item.org));
        if(item.date) chips.push(chip(item.date));
      }
      if(type === "act"){
        if(item.period) chips.push(chip(item.period));
        (item.roles || "").split(",").map(function(r){ return r.trim(); }).filter(Boolean).slice(0,4).forEach(function(r){ chips.push(chip(r)); });
      }
      if(type === "award"){
        if(item.prize) chips.push(chip(item.prize));
        if(item.role) chips.push(chip(item.role));
      }
      if(type === "intern"){
        if(item.country) chips.push(chip(item.country));
        if(item.period) chips.push(chip(item.period));
        if(item.dept) chips.push(chip(item.dept));
      }
      if(type === "file"){
        if(item.kind) chips.push(chip(item.kind));
        if(item.date) chips.push(chip(item.date));
        if(item.filename) chips.push(chip(item.filename));
      }
      return chips.join("");
    }

    function chip(text){ return '<span class="chip">' + esc(text) + "</span>"; }

    function showModal(innerHtml){
      var overlay = document.getElementById("modal-overlay");
      var inner = document.getElementById("modal-inner");
      inner.innerHTML = innerHtml;
      overlay.style.display = "flex";
      bindDynamicButtons(inner);
      setTimeout(function(){
        var first = inner.querySelector("input, textarea, button");
        if(first) first.focus();
      }, 0);
    }

    function bindDynamicButtons(root){
      root = root || document;
      // card buttons
      var cards = document.querySelectorAll(".card.clickable");
      cards.forEach(function(card){
        card.onclick = function(){
          var t = card.getAttribute("data-type");
          var idx = parseInt(card.getAttribute("data-index") || "0", 10);
          openDetail(t, idx);
        };
      });

      var actionBtns = document.querySelectorAll(".card-actions .act-btn, .intern-actions .act-btn");
      actionBtns.forEach(function(btn){
        btn.onclick = function(e){
          e.stopPropagation();
          var action = btn.getAttribute("data-action");
          var t = btn.getAttribute("data-type");
          var idx = parseInt(btn.getAttribute("data-index") || "0", 10);
          if(action === "detail") openDetail(t, idx);
          else if(action === "edit") editItem(t, idx);
          else if(action === "delete") delItem(t, idx);
        };
      });

      // detail modal buttons
      var editDetailBtns = root.querySelectorAll("[data-detail-edit-type]");
      editDetailBtns.forEach(function(btn){
        btn.onclick = function(){
          var t = btn.getAttribute("data-detail-edit-type");
          var idx = parseInt(btn.getAttribute("data-detail-index") || "0", 10);
          openModal(t, idx);
        };
      });
      var deleteDetailBtns = root.querySelectorAll("[data-detail-delete-type]");
      deleteDetailBtns.forEach(function(btn){
        btn.onclick = function(){
          var t = btn.getAttribute("data-detail-delete-type");
          var idx = parseInt(btn.getAttribute("data-detail-index") || "0", 10);
          delItem(t, idx);
        };
      });
    }

    function closeModal(){
      var overlay = document.getElementById("modal-overlay");
      overlay.style.display = "none";
      document.getElementById("modal-inner").innerHTML = "";
    }

    function modalTop(title){
      return '<div class="modal-top">'
        + "<h3>" + esc(title) + "</h3>"
        + '<button class="modal-close" onclick="closeModal()">닫기</button>'
        + "</div>";
    }

    function modalBtns(){
      return '<div class="modal-btns">'
        + '<button class="btn" onclick="closeModal()">취소</button>'
        + '<button class="btn primary" onclick="saveItem()">저장</button>'
        + "</div>";
    }

    function field(label, id, tag, placeholder, value){
      var el = tag === "textarea"
        ? '<textarea id="' + id + '" placeholder="' + esc(placeholder) + '">' + esc(value) + "</textarea>"
        : '<input id="' + id + '" type="text" placeholder="' + esc(placeholder) + '" value="' + esc(value) + '">';
      return '<div class="field"><label>' + esc(label) + "</label>" + el + "</div>";
    }

    /* ── Save ── */
    function saveItem(){
      var t = editing.type;
      var arr = getArr(t);
      var item = {};

      if(t === "cert"){
        var name = val("f1"); if(!name){ alert("자격증명을 입력해 주세요"); return; }
        item = {
          name: name,
          org: val("f2"),
          date: val("f3"),
          summary: val("f4"),
          body: val("f5"),
          photos: [val("p1"), val("p2")].filter(Boolean)
        };

      } else if(t === "act"){
        var title = val("f1"); if(!title){ alert("활동명을 입력해 주세요"); return; }
        item = {
          title: title,
          period: val("f2"),
          roles: val("f3"),
          work: val("f4"),
          learn: val("f5"),
          body: val("f6"),
          photos: [val("p1"), val("p2")].filter(Boolean)
        };

      } else if(t === "award"){
        var contest = val("f1"); if(!contest){ alert("대회명을 입력해 주세요"); return; }
        item = {
          contest: contest,
          prize: val("f2"),
          role: val("f3"),
          summary: val("f4"),
          feel: val("f5"),
          body: val("f6"),
          photos: [val("p1"), val("p2")].filter(Boolean)
        };

      } else if(t === "intern"){
        var company = val("f1"); if(!company){ alert("회사명을 입력해 주세요"); return; }
        var gains = [
          { title: val("g1t"), desc: val("g1d") },
          { title: val("g2t"), desc: val("g2d") },
          { title: val("g3t"), desc: val("g3d") }
        ].filter(function(g){ return g.title || g.desc; });
        item = {
          company: company,
          country: val("f2"),
          period: val("f3"),
          dept: val("f4"),
          gains: gains,
          body: val("f6"),
          photos: [val("p1"), val("p2")].filter(Boolean)
        };

      } else if(t === "skill"){
        var raw = val("s1");
        var list = raw.split(",").map(function(s){ return s.trim(); }).filter(Boolean);
        state.skills = list;
        persist();
        renderAll();
        closeModal();
        return;

      } else if(t === "file"){
        var ftitle = val("f1"); if(!ftitle){ alert("자료 이름을 입력해 주세요"); return; }
        var link = val("f5");

        var uploadInput = document.getElementById("fileUpload");
        var fileObj = uploadInput && uploadInput.files && uploadInput.files[0] ? uploadInput.files[0] : null;

        function finalize(dataUrl, filename, mime){
          item = {
            title: ftitle,
            kind: val("f2"),
            date: val("f3"),
            note: val("f4"),
            link: link,
            dataUrl: dataUrl || "",
            filename: filename || "",
            mime: mime || ""
          };
          if(editing.idx !== null) arr[editing.idx] = item;
          else arr.push(item);
          persist();
          renderAll();
          closeModal();
        }

        // 링크만 있는 경우
        if(!fileObj){
          finalize("", "", "");
          return;
        }

        // 업로드 저장 (크기 제한: 10MB, 브라우저 용량에 따라 실패할 수 있음)
        if(fileObj.size > 10 * 1024 * 1024){
          alert("파일이 너무 커요. 10MB 이하로 올리거나 링크로 첨부해 주세요.");
          return;
        }

        var reader = new FileReader();
        reader.onload = function(){
          finalize(String(reader.result || ""), fileObj.name || "", fileObj.type || "");
        };
        reader.onerror = function(){
          alert("파일을 읽지 못했어요. 링크 첨부로 시도해 주세요.");
        };
        reader.readAsDataURL(fileObj);

      } else if(t === "hero"){
        var nameHtml = val("f1") || "가영";
        var subText = val("f2");
        state.hero.kicker = val("hk") || "Black & Pink • Modern";
        state.hero.nameHtml = sanitizeNameHtml(nameHtml);
        state.hero.subText = subText;
        state.hero.links = [
          { label: val("l1a"), value: val("l1b") },
          { label: val("l2a"), value: val("l2b") },
          { label: val("l3a"), value: val("l3b") }
        ].filter(function(l){ return (l.label || "").trim() || (l.value || "").trim(); });
        state.hero.tags = [val("k1"), val("k2"), val("k3")].filter(function(t){ return (t || "").trim(); });
        persist();
        renderAll();
        closeModal();
        return;

      } else if(t === "about"){
        state.about = {
          cards: [
            { num: "#1", title: val("a1t") || "왜 물류·공급망을 선택했는지", body: val("a1b") },
            { num: "#2", title: val("a2t") || "커리어 방향", body: val("a2b") },
            { num: "#3", title: val("a3t") || "내가 중요하게 보는 가치", body: val("물류가 멈추면 세상이 멈춘다는 말처럼 끊임없이 나아가는, 멈추지 않는 사람이 되고자 합니다.") }
          ]
        };
        persist();
        renderAll();
        closeModal();
        return;

      } else if(t === "sections"){
        state.sectionTitles = {
          cert: val("s1") || "Certificates · 자격증",
          act: val("s2") || "Activities · 대외활동",
          award: val("s3") || "Awards · 공모전 수상",
          intern: val("s4") || "Internship · 해외인턴",
          skill: val("s5") || "Skills · 사용 가능 스킬",
          file: val("s6") || "Files · 첨부자료"
        };
        persist();
        renderAll();
        closeModal();
        return;
      }

      if(editing.idx !== null) arr[editing.idx] = item;
      else arr.push(item);

      persist();
      renderAll();
      closeModal();
    }

    function editItem(type, idx){ openModal(type, idx); }

    function delItem(type, idx){
      if(!confirm("삭제할까요?")) return;
      getArr(type).splice(idx, 1);
      persist();
      renderAll();
      closeModal();
    }

    /* ── Helpers ── */
    function getArr(type){
      return type === "cert" ? state.certs :
             type === "act" ? state.acts :
             type === "award" ? state.awards :
             type === "intern" ? state.interns :
             type === "file" ? state.files : [];
    }

    function val(id){
      var el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function esc(s){
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escJs(s){
      var str = String(s || "");
      return "'" + str.replace(/\\/g, "\\\\").replace(/'/g, "\\'") + "'";
    }

    function sanitizeNameHtml(input){
      // allow only <em> tags; strip everything else
      var s = String(input || "");
      s = s.replace(/</g, "&lt;").replace(/>/g, "&gt;");
      // restore safe em tags
      s = s.replace(/&lt;em&gt;/g, "<em>").replace(/&lt;\/em&gt;/g, "</em>");
      return s;
    }

    function isLikelyUrl(v){
      var s = String(v || "").trim();
      return /^https?:\/\/\S+/i.test(s);
    }

    function isLikelyEmail(v){
      var s = String(v || "").trim();
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
    }

    /* ── Hero edit + photo ── */
    function openHeroEdit(){ openModal("hero"); }

    function wireHeroPhoto(){
      var input = document.getElementById("hero-photo-input");
      if(!input) return;
      input.addEventListener("change", function(){
        var file = input.files && input.files[0];
        if(!file) return;
        if(!/^image\//.test(file.type)){
          alert("이미지 파일만 업로드할 수 있어요");
          return;
        }
        var reader = new FileReader();
        reader.onload = function(){
          state.hero.photoDataUrl = String(reader.result || "");
          persist();
          applyHeroPhoto();
        };
        reader.readAsDataURL(file);
      });
    }

    function applyHeroPhoto(){
      var img = document.getElementById("hero-photo-img");
      var empty = document.getElementById("hero-photo-empty");
      var data = (state.hero.photoDataUrl || "").trim();
      if(!img || !empty) return;
      if(data){
        img.src = data;
        img.style.display = "block";
        empty.style.display = "none";
      }else{
        img.removeAttribute("src");
        img.style.display = "none";
        empty.style.display = "block";
      }
    }

    function clearHeroPhoto(){
      if(!state.hero.photoDataUrl) return;
      if(!confirm("업로드한 사진을 삭제할까요?")) return;
      state.hero.photoDataUrl = "";
      persist();
      applyHeroPhoto();
      var input = document.getElementById("hero-photo-input");
      if(input) input.value = "";
    }

    function openPhotoModal(){
      var html = modalTop("사진/커버 설정")
        + '<div class="detail-grid">'
        + '<div class="detail-body">상단 카드에서 <strong>이미지 업로드</strong>를 누르면 바로 적용돼요. (새로고침해도 유지됩니다)</div>'
        + "</div>"
        + '<div class="modal-btns">'
        + '<button class="btn" onclick="closeModal()">Close</button>'
        + "</div>";
      showModal(html);
    }

    /* ── Custom cursor ── */
    (function(){
      var dot = document.getElementById("cursor-dot");
      var ring = document.getElementById("cursor-ring");
      if(!dot || !ring) return;

      var x = window.innerWidth / 2;
      var y = window.innerHeight / 2;
      var ringX = x, ringY = y;

      function move(e){
        x = e.clientX;
        y = e.clientY;
        // 중심을 기준으로 이동 (CSS에서 translate(-50%, -50%) 유지)
        dot.style.left = x + "px";
        dot.style.top = y + "px";
      }

      function loop(){
        // 더 빠르게 따라오도록 계수 증가
        ringX += (x - ringX) * 0.32;
        ringY += (y - ringY) * 0.32;
        ring.style.left = ringX + "px";
        ring.style.top = ringY + "px";
        requestAnimationFrame(loop);
      }
      loop();

      window.addEventListener("mousemove", move);

      // 클릭 시 살짝 줄어드는 효과
      window.addEventListener("mousedown", function(){
        ring.style.width = "24px";
        ring.style.height = "24px";
      });
      window.addEventListener("mouseup", function(){
        ring.style.width = "32px";
        ring.style.height = "32px";
      });
    })();
  </script>
</body>
</html>
